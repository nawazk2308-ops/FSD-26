<!DOCTYPE html>
<html>
<head>
    <title>HTML Form Input Tags</title>
</head>
<body>

<h2>HTML Form Elements Example</h2>

<form>

    <!-- Text Input -->
    <label>Text:</label>
    <input type="text" placeholder="Enter your name"><br><br>

    <!-- Password -->
    <label>Password:</label>
    <input type="password" placeholder="Enter password"><br><br>

    <!-- Email -->
    <label>Email:</label>
    <input type="email" placeholder="Enter email"><br><br>

    <!-- Number -->
    <label>Number:</label>
    <input type="number" placeholder="Enter number"><br><br>

    <!-- Telephone -->
    <label>Phone:</label>
    <input type="tel" placeholder="Enter phone number"><br><br>

    <!-- URL -->
    <label>Website:</label>
    <input type="url" placeholder="Enter website URL"><br><br>

    <!-- Search -->
    <label>Search:</label>
    <input type="search" placeholder="Search here"><br><br>

    <!-- Date -->
    <label>Date:</label>
    <input type="date"><br><br>

    <!-- Time -->
    <label>Time:</label>
    <input type="time"><br><br>

    <!-- Date and Time -->
    <label>Date & Time:</label>
    <input type="datetime-local"><br><br>

    <!-- Month -->
    <label>Month:</label>
    <input type="month"><br><br>

    <!-- Week -->
    <label>Week:</label>
    <input type="week"><br><br>

    <!-- Color Picker -->
    <label>Color:</label>
    <input type="color"><br><br>

    <!-- Range Slider -->
    <label>Range:</label>
    <input type="range" min="0" max="100"><br><br>

    <!-- Radio Buttons -->
    <label>Gender:</label>
    <input type="radio" name="gender"> Male
    <input type="radio" name="gender"> Female
    <br><br>

    <!-- Checkboxes -->
    <label>Skills:</label>
    <input type="checkbox"> HTML
    <input type="checkbox"> CSS
    <input type="checkbox"> C++
    <br><br>

    <!-- File Upload -->
    <label>Upload File:</label>
    <input type="file"><br><br>

    <!-- Hidden Input -->
    <input type="hidden" value="12345">

    
    

    <!-- Select Dropdown -->
    <label>City:</label>
    <select>
        <option>Rajkot</option>
        <option>Ahmedabad</option>
        <option>Surat</option>
    </select>
    <br><br>

    <!-- Textarea -->
    <label>Message:</label><br>
    <textarea rows="5" cols="30"></textarea>
    <br><br>

    <!-- Datalist -->
    <label>Choose a Browser:</label>
    <input list="browsers">
    <datalist id="browsers">
        <option value="Chrome">
        <option value="Firefox">
        <option value="Edge">
        <option value="Safari">
    </datalist>
    <br><br>

    <!-- Buttons -->
    <input type="submit" value="Submit">
    <input type="reset" value="Reset">
    <input type="button" value="Click Me">

</form>

</body>
</html>
